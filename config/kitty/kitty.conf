# Kitty Configuration
# Managed by Home Manager (dotfiles-mac)

# Terminal settings
term xterm-kitty

# Font configuration
font_family JetBrainsMono Nerd Font
font_size 14.0

# Window settings
window_padding_width 8

# Transparency
background_opacity 0.90
dynamic_background_opacity yes

# Scrollback
scrollback_lines 10000

# Clipboard
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask

# macOS optimizations
macos_thicken_font 0.75
macos_option_as_alt left

# Audio
enable_audio_bell no

# Colors - Tokyo Night
background #1a1b26
foreground #c0caf5
cursor #c0caf5
cursor_text_color #1a1b26

# Normal colors
color0 #15161e
color1 #f7768e
color2 #9ece6a
color3 #e0af68
color4 #7aa2f7
color5 #bb9af7
color6 #7dcfff
color7 #a9b1d6

# Bright colors
color8 #414868
color9 #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5

# Tab bar
tab_bar_style powerline
tab_bar_edge bottom
tab_powerline_style slanted

# Keybindings
# Tab management
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+t new_tab
map cmd+w close_tab

# Clipboard
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard
