# Tmux Configuration
# Managed by Home Manager (dotfiles-mac)

# Use zsh as the default shell
# Note: The shell path is inherited from the login shell
# This file focuses on tmux behavior and appearance

# Mouse support
set -g mouse on

# Base index for windows and panes
set -g base-index 1
setw -g pane-base-index 1

# 24-hour clock
setw -g clock-mode-style 24

# History limit
set -g history-limit 10000

# Escape time (recommended for vim responsiveness)
set -s escape-time 10

# Vim integration for pane navigation
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"

# Status bar styling
set -g status-style "bg=colour236 fg=white"
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"

# Vim-style pane navigation with Ctrl+hjkl
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# Tmux version compatibility for backslash binding
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

# Copy mode vim navigation
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Change prefix from C-b to C-q
unbind C-b
set -g prefix C-q

# Pane resizing with Alt+Arrow keys
bind-key -n M-Up resize-pane -U 3
bind-key -n M-Down resize-pane -D 3
bind-key -n M-Left resize-pane -L 3
bind-key -n M-Right resize-pane -R 3
