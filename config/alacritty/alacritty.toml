# Alacritty Configuration
# Managed by Home Manager (dotfiles-mac)

[env]
TERM = "xterm-256color"

[font]
size = 14.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[colors.primary]
background = "0x282c34"
foreground = "0xabb2bf"

[colors.cursor]
text = "0x282c34"
cursor = "0x528bff"

[colors.normal]
black = "0x282c34"
red = "0xe06c75"
green = "0x98c379"
yellow = "0xe5c07b"
blue = "0x61afef"
magenta = "0xc678dd"
cyan = "0x56b6c2"
white = "0xabb2bf"

[window]
dynamic_padding = true
decorations = "Buttonless"
opacity = 0.75
blur = false
startup_mode = "Windowed"

[window.padding]
x = 10
y = 10

[scrolling]
history = 100000
multiplier = 3
